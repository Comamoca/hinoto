language: en-US

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: |
    Always write the PR summary in English, regardless of the repository's primary language.
  poem: false
  review_status: true
  collapse_walkthrough: false
  changed_files_summary: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "wip"
    ignore_usernames:
      - "renovate"
      - "renovate[bot]"
    base_branches:
      - main
      - dev

  tools:
    ast-grep:
      rule_dirs:
        - .coderabbit/rules

  path_filters:
    - "!build/**"
    - "!_build/**"
    - "!**/manifest.toml"
    - "!**/*.lock"

  path_instructions:
    # FFI files: bridge between Gleam type system and JavaScript runtime — focus on type conversion accuracy
    - path: "src/hinoto/runtime/ffi.*.mjs"
      instructions: |
        This file is the FFI bridge between Gleam and the JavaScript runtime. Please focus on the following.

        ## Required Checks

        ### 1. HTTP Method type conversion (Issue #22)
        Verify that the `method` field inside the `toGleamRequest` function is not assigned a raw string.
        Gleam's `http.Method` type is represented as class instances like `Get`, `Post` in JavaScript — not strings.

        **Bad pattern (bug):**
        ```js
        method: req.method.toUpperCase()  // returns a string → breaks pattern matching on the Gleam side
        ```

        **Good pattern:**
        ```js
        // Convert to a Method instance using parse_method
        method: parseMethod(req.method)
        ```

        ### 2. Correct instantiation of Gleam types
        Where a Gleam custom type (subclass of `$CustomType`) is returned, confirm it is always instantiated with `new ClassName()`.

        ### 3. List conversion
        Gleam's `List` type differs from JavaScript arrays. Confirm `List.fromArray()` is used.

        ### 4. Option type conversion
        Confirm that `undefined` / `null` is not returned as-is. Gleam's `Option` type must be expressed as `Some(x)` or `None`.

    # Gleam source files
    - path: "src/**/*.gleam"
      instructions: |
        This is a Gleam code review. Please verify the following.

        - The type signature of functions annotated with `@external` matches the corresponding FFI implementation.
        - The types of values returned from FFI are correct (especially `http.Method`, `gleam/http/request.Request`, etc.).
        - `@target(javascript)` and `@target(erlang)` branches are used appropriately.

    # example directory
    - path: "example/**/*.gleam"
      instructions: |
        This is a review of sample code.

        - Confirm that the argument type of `workers.serve` is `Hinoto(WorkersContext, Body)` (not `String`).
        - Confirm that the value passed to `response.set_body` is the correct `Body` type (using `body.StringBody(...)`).
        - If type annotations are omitted, verify that type inference works correctly.

    # test files
    - path: "test/**/*.gleam"
      instructions: |
        This is a review of test code.

        - Confirm that test cases covering FFI type conversions are included.
        - Verify that pattern matching for each HTTP method (GET, POST, PUT, DELETE, etc.) works correctly.

chat:
  auto_reply: true
