rules:
  # Issue #22: Detect patterns where req.method is returned as a raw string in FFI
  # Gleam's Method type is a JavaScript class instance, not a string
  - id: ffi-gleam-method-string-assignment
    language: JavaScript
    rule:
      pattern: method: $METHOD.toUpperCase()
    message: |
      Assigning a raw string directly to the `method` field (Issue #22).

      Gleam's HTTP method type (`Method` from `gleam/http`) is represented in JavaScript
      as class instances like `Get`, `Post`, etc. Assigning a string causes
      `case req.method { http.Get -> ... }` pattern matching on the Gleam side to
      always fall through to `_`, completely breaking routing.

      Use `http.parse_method()` to convert to a Method instance.
    severity: error
    note: |
      Fix example:
        // Add: import * as $http from "gleam_http/gleam/http.mjs";
        function parseMethod(m) {
          const r = $http.parse_method(m.toUpperCase());
          return (r instanceof Ok) ? r[0] : new $http.Other(m.toUpperCase());
        }
        // Change: method: parseMethod(req.method)
